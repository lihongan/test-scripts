---
# 1. vLLM Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-server
  template:
    metadata:
      labels:
        app: vllm-server
    spec:
      containers:
      - name: vllm
        image: public.ecr.aws/q9t5s3a7/vllm-cpu-release-repo:v0.9.1
        command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
        args:
        - "--model=Qwen/Qwen2.5-1.5B-Instruct"
        - "--port=8000"
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"

---
# 2. Minimal EPP
apiVersion: v1
kind: Service
metadata:
  name: simple-epp
spec:
  selector:
    app: simple-epp
  ports:
  - port: 9002
    targetPort: 9002
    appProtocol: http2

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-epp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-epp
  template:
    metadata:
      labels:
        app: simple-epp
    spec:
      containers:
      - name: epp
        image: us-central1-docker.pkg.dev/k8s-staging-images/gateway-api-inference-extension/epp:main
        args: ["-poolName=vllm-pool", "-poolNamespace=default", "-grpcPort=9002", "-grpcHealthPort=9003"]
        ports:
        - containerPort: 9002
        - containerPort: 9003

---
# 3. RBAC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: epp-reader
rules:
- apiGroups: ["inference.networking.x-k8s.io"]
  resources: ["inferencepools"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: epp-reader-binding
subjects:
- kind: ServiceAccount
  name: default
  namespace: default
roleRef:
  kind: ClusterRole
  name: epp-reader

---
# 4. InferencePool
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferencePool
metadata:
  name: vllm-pool
spec:
  selector:
    app: vllm-server
  targetPortNumber: 8000
  extensionRef:
    name: simple-epp
